name: ci
on:
  push:
    paths-ignore: ['docs/**', '**.md']
  pull_request:
    paths-ignore: ['docs/**', '**.md']
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release
